# ── Backend CI/CD — ShopSphere API ────────────────────────────────────────────
# Triggers: push / PR to main or develop on backend/** paths
# Jobs:
#   1. lint    – ESLint code quality check
#   2. test    – Jest unit/integration tests (in-memory MongoDB)
#   3. deploy  – Deploy to Render on push to main (skipped on PRs)
#
# Required GitHub Secrets:
#   RENDER_API_KEY        – Render personal API key
#   RENDER_SERVICE_ID     – Render service ID (from service URL)

name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

defaults:
  run:
    working-directory: backend

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    needs: lint

    # Spin up a real MongoDB service container for integration tests
    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV:              test
      PORT:                  5000
      MONGODB_URI:           mongodb://localhost:27017/shopsphere_test
      JWT_ACCESS_SECRET:     ci_access_secret_32chars_minimum_x
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET:    ci_refresh_secret_32chars_minimum_x
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL:            http://localhost:5173
      STRIPE_SECRET_KEY:     sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      CLOUDINARY_CLOUD_NAME: placeholder
      CLOUDINARY_API_KEY:    placeholder
      CLOUDINARY_API_SECRET: placeholder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB
        run: |
          echo "MongoDB service is managed by GitHub Actions 'services' healthcheck."
          echo "Skipping explicit mongosh ping (mongosh is not installed on runner)."

      - name: Run tests
        run: npm test --if-present

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ── 3. Deploy to Render ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    # Only deploy from main branch pushes (not PRs)
    # Also skip if Render secrets are not configured (prevents failing CI on forks/new repos).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.RENDER_DEPLOY_HOOK_URL != '' && secrets.RENDER_API_KEY != '' && secrets.RENDER_SERVICE_ID != ''

    steps:
      - name: Trigger Render deploy hook
        # Render provides a deploy hook URL; we call it to initiate a new deploy.
        # Store the full hook URL as RENDER_DEPLOY_HOOK_URL in GitHub Secrets.
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        working-directory: .   # override working-directory for curl

      - name: Wait for Render deploy (poll)
        # Use Render API to poll deployment status until live or failed.
        # Polls every 15s for up to 10 minutes.
        run: |
          echo "Polling Render service status..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['deploy']['status'])" 2>/dev/null || echo "unknown")
            echo "Deploy status: $STATUS (attempt $i/40)"
            if [ "$STATUS" = "live" ]; then
              echo "Deploy succeeded!"
              exit 0
            elif [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ]; then
              echo "Deploy failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done
          echo "Deploy timed out after 10 minutes"
          exit 1
        working-directory: .
