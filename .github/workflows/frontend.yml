# ── Frontend CI/CD — ShopSphere React App ────────────────────────────────────
# Triggers: push / PR to main or develop on frontend/** paths
# Jobs:
#   1. lint    – ESLint code quality check
#   2. build   – Vite production build (validates bundle compiles clean)
#   3. deploy  – Deploy to Vercel on push to main via Vercel CLI
#
# Required GitHub Secrets:
#   VERCEL_TOKEN       – Vercel personal access token (account settings)
#   VERCEL_ORG_ID      – Found in .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  – Found in .vercel/project.json after `vercel link`
#
# Required GitHub Variables (Settings → Variables):
#   VITE_API_URL       – Production API URL, e.g. https://api.shopsphere.com/api/v1

name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── 2. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: lint

    env:
      # Use a placeholder for CI — Vercel injects real value at deploy time.
      # The build must succeed with this value; runtime API calls use window env.
      VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.shopsphere.com/api/v1' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vite production build
        run: npm run build

      - name: Check bundle size
        # Warn if any individual chunk exceeds 500 KB (gzipped estimate)
        run: |
          echo "=== Bundle size report ==="
          du -sh dist/assets/*.js 2>/dev/null | sort -hr | head -20
          LARGEST=$(du -b dist/assets/*.js 2>/dev/null | sort -rn | head -1 | cut -f1)
          if [ -n "$LARGEST" ] && [ "$LARGEST" -gt 524288 ]; then
            echo "WARNING: Largest chunk is $(( LARGEST / 1024 ))KB — consider further code splitting"
          else
            echo "Bundle sizes look healthy."
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── 3. Preview Deploy (PRs) ──────────────────────────────────────────────────
  preview:
    name: Vercel Preview Deploy
    runs-on: ubuntu-latest
    needs: build
    # Only on PRs (not push to main, which gets the production deploy)
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest
        working-directory: .

      - name: Install dependencies
        run: npm ci

      - name: Deploy preview to Vercel
        id: vercel-preview
        run: |
          DEPLOY_URL=$(vercel deploy \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --build-env VITE_API_URL="${{ vars.VITE_API_URL }}" \
            --yes \
            2>&1 | tail -1)
          echo "preview_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Vercel Preview Deploy\n\n Preview URL: ${{ steps.vercel-preview.outputs.preview_url }}\n\nThis preview will be automatically deleted when the PR is merged.`
            })

  # ── 4. Production Deploy (main branch) ───────────────────────────────────────
  deploy:
    name: Vercel Production Deploy
    runs-on: ubuntu-latest
    needs: build
    # Only deploy from main branch pushes (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest
        working-directory: .

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (production)
        id: vercel-production
        run: |
          DEPLOY_URL=$(vercel deploy \
            --prod \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --build-env VITE_API_URL="${{ vars.VITE_API_URL }}" \
            --yes \
            2>&1 | tail -1)
          echo "production_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Production URL: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post deploy summary
        run: |
          echo "### Frontend Deployed to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ steps.vercel-production.outputs.production_url }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        working-directory: .
